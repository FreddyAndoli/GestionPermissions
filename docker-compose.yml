services:
  mysql:
    image: mysql:8.0
    container_name: pm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: permission_manager
      MYSQL_USER: pm_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10
    networks:
      - pm_network

  redis:
    image: redis:7-alpine
    container_name: pm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    container_name: pm_backend
    command: npm run dev
    restart: unless-stopped
    ports:
      - "8080:4000"
    env_file:
      - ./backend/.env
    environment:
      # Docker-specific overrides. All other vars come from env_file (backend/.env).
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=mysql://pm_user:${DB_PASSWORD:-password}@mysql:3306/permission_manager
      - REDIS_URL=redis://redis:6379
      - REDIS_PERMISSIONS_TTL=${REDIS_PERMISSIONS_TTL:-900}
      - REDIS_RATE_LIMIT_WINDOW=${REDIS_RATE_LIMIT_WINDOW:-60}
      - REDIS_RATE_LIMIT_MAX=${REDIS_RATE_LIMIT_MAX:-100}
      - REDIS_SESSION_TTL=${REDIS_SESSION_TTL:-3600}
      - REDIS_LOGIN_ATTEMPTS_MAX=${REDIS_LOGIN_ATTEMPTS_MAX:-5}
      - REDIS_LOCKOUT_DURATION=${REDIS_LOCKOUT_DURATION:-900}
      - NOTIFICATION_PROVIDER=${NOTIFICATION_PROVIDER:-telegram}
      - PDF_STORAGE_PATH=${PDF_STORAGE_PATH:-./storage/reports}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DIR=${LOG_DIR:-./logs}
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: pm_frontend
    # Next.js dev server must bind to 0.0.0.0 to be reachable from nginx.
    # Port 3000 is guaranteed free inside the container, so we bypass start.mjs.
    command: sh -c "npx next dev -p 3000 -H 0.0.0.0"
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      # Docker-specific overrides. All other vars come from env_file (frontend/.env).
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_APP_URL=http://localhost
      - NEXT_PUBLIC_APP_NAME=Permission Manager
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Next.js App Router has no root page (404 on /). Check /login which returns 200.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pm_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: pm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pm_network

volumes:
  mysql_data:
  redis_data:

networks:
  pm_network:
    driver: bridge
